name: Déployer sur Pages

# Déploiement explicite (remplace « Deploy from a branch », qui échouait par
# intermittence). Nécessite : Settings → Pages → Source = « GitHub Actions ».
on:
  # Push manuel (changements de code).
  push:
    branches: [main]
  # Après chaque mise à jour de contenu par le bot : les pushes du GITHUB_TOKEN
  # ne déclenchent pas `on: push`, mais `workflow_run` se déclenche bien à la fin
  # des workflows du bot → le site est toujours redéployé après un cron.
  workflow_run:
    workflows: ["Mise à jour des actus", "Générer des cartes (IA)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on ne coupe pas celui en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload de l'artefact (le repo tel quel)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
