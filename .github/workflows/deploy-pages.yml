name: Déployer sur Pages

# Déploiement explicite (remplace « Deploy from a branch », qui échouait par
# intermittence). Nécessite : Settings → Pages → Source = « GitHub Actions ».
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on ne coupe pas celui en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload de l'artefact (le repo tel quel)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
