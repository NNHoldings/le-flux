name: Générer des cartes (IA)

on:
  # Automatique 3×/jour (matin / midi / soir, décalé de 30 min après les actus).
  # Sans input → le script choisit type + thème par rotation : matin=mandarin,
  # midi=finance, soir=DEC, avec un thème qui avance chaque jour.
  schedule:
    - cron: "30 5,11,17 * * *"   # 07h30 / 13h30 / 19h30 Paris
  # Manuel : pour forcer un type / thème précis quand tu veux.
  workflow_dispatch:
    inputs:
      type:
        description: "Type de cartes"
        type: choice
        required: false
        options: [mandarin, finance, dec, ia, histoire]
      topic:
        description: "Thème (ex: vocabulaire de la banque, IFRS 15, NEP 240)"
        type: string
        required: false
      count:
        description: "Nombre de cartes"
        type: string
        required: false
        default: "10"

permissions:
  contents: write
  models: read          # accès gratuit à GitHub Models via le jeton intégré

concurrency:
  group: data-updates
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Générer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TYPE: ${{ inputs.type }}
          TOPIC: ${{ inputs.topic }}
          COUNT: ${{ inputs.count }}
        run: node scripts/generate-content.mjs
      - name: Commit
        run: |
          git config user.name "le-flux-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Rien de neuf."
          else
            git commit -m "content: cartes IA $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
